services:
  - type: web
    name: sonsial-x-view
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: sonsial x view
      - key: TWIKIT_LANGUAGE
        value: ja-JP
      - key: CACHE_TTL_SECONDS
        value: 120
      - key: REQUEST_MIN_INTERVAL_SECONDS
        value: 2.0
      - key: RETRY_ATTEMPTS
        value: 3
      - key: TWEET_COUNT
        value: 20
