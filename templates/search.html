{% extends "base.html" %}

{% block title %}検索 - {{ settings.app_name }}{% endblock %}

{% block content %}
  <header class="sticky top-0 z-30 border-b border-xborder bg-black/80 p-4 backdrop-blur">
    <form action="/search" method="get" class="flex gap-2">
      <input
        class="w-full rounded-full bg-zinc-900 px-5 py-3 outline-none ring-xblue transition placeholder:text-zinc-500 focus:ring-2"
        type="search"
        name="q"
        value="{{ q }}"
        placeholder="キーワードを検索"
      />
      <select name="product" class="rounded-full bg-zinc-900 px-3 text-sm outline-none">
        {% for item in ["Latest", "Top", "Media"] %}
          <option value="{{ item }}" {% if product == item %}selected{% endif %}>{{ item }}</option>
        {% endfor %}
      </select>
      <button class="rounded-full bg-xblue px-5 font-bold text-white transition hover:bg-sky-500">検索</button>
    </form>
  </header>

  <section>
    {% if q %}
      <div class="border-b border-xborder px-4 py-3 text-sm text-zinc-500">「{{ q }}」の検索結果</div>
    {% endif %}
    {% for tweet in tweets %}
      {% include "partials/tweet_card.html" %}
    {% else %}
      <div class="p-8 text-center text-zinc-500">検索ワードを入力してください。</div>
    {% endfor %}
  </section>
{% endblock %}
