{% extends "base.html" %}

{% block title %}エラー - {{ settings.app_name }}{% endblock %}

{% block content %}
  <div class="grid min-h-screen place-items-center p-8">
    <div class="max-w-md rounded-3xl border border-xborder bg-zinc-950 p-6">
      <div class="text-4xl">⚠️</div>
      <h1 class="mt-4 text-2xl font-black">読み込みに失敗しました</h1>
      <p class="mt-3 whitespace-pre-wrap text-sm leading-6 text-zinc-400">{{ message }}</p>
      <a href="/" class="mt-5 inline-flex rounded-full bg-xblue px-5 py-2 font-bold text-white transition hover:bg-sky-500">ホームへ戻る</a>
    </div>
  </div>
{% endblock %}
